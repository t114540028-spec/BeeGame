<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐝 蜜蜂授粉小遊戲</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
    }

    /* ── 遊戲主容器 ── */
    #game-container {
      position: relative;
      width: 900px;
      height: 506px;         /* 16:9 比例 */
      overflow: hidden;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    /* ── 背景圖 ── */
    #bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    /* ── 通用精靈樣式 ── */
    .sprite {
      position: absolute;
      z-index: 10;
      image-rendering: auto;
      user-select: none;
      pointer-events: none;
    }

    /* ── 蜜蜂：位置由 JS 完全管理 ── */
    #bee {
      width: 80px;
      /* left / top 由 JS 初始化後設定 */
      transition: left 0.05s linear, top 0.05s linear;
    }

    /* ── 隨機精靈：JS 在載入時設定 left/top ── */
    #dragonfly  { width: 90px; }
    #flower-pink { width: 90px; }
    #flower-red  { width: 90px; }
    #scallion    { width: 65px; }
    #berry       { width: 70px; }

    /* ════════════════════════════════
       箭頭控制區塊 — 與遊戲精靈分開
       置於底部綠地帶，左側
       ════════════════════════════════ */
    #arrow-panel {
      position: absolute;
      z-index: 20;
      bottom: 12px;
      left: 16px;
      display: grid;
      grid-template-columns: 64px 64px 64px;
      grid-template-rows:    64px 64px;
      gap: 4px;
      /* 半透明底板讓箭頭區明顯與背景分開 */
      background: rgba(0,0,0,0.18);
      border: 2px solid rgba(255,220,60,0.45);
      border-radius: 12px;
      padding: 6px;
    }

    .arrow-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      pointer-events: all;
      user-select: none;
    }

    .arrow-btn img {
      width: 54px;
      height: 54px;
      object-fit: contain;
      /* 依按鈕位置旋轉同一張 arrow.png */
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
      transition: transform 0.1s ease, filter 0.1s ease;
    }

    .arrow-btn:hover img {
      transform: scale(1.15);
      filter: drop-shadow(0 4px 8px rgba(255,200,0,0.7));
    }

    .arrow-btn:active img {
      transform: scale(0.92);
      filter: drop-shadow(0 2px 6px rgba(255,200,0,0.9)) brightness(1.2);
    }

    /* grid 位置: (row / col)
       上 → row1 col2
       左 → row2 col1
       下 → row2 col2
       右 → row2 col3          */
    #btn-up    { grid-area: 1 / 2; }
    #btn-left  { grid-area: 2 / 1; }
    #btn-down  { grid-area: 2 / 2; }
    #btn-right { grid-area: 2 / 3; }

    /* 方向旋轉 */
    #btn-up    img { transform: rotate(-90deg); }
    #btn-left  img { transform: rotate(180deg); }
    #btn-down  img { transform: rotate(90deg);  }
    #btn-right img { transform: rotate(0deg);   }

    #btn-up:hover    img { transform: rotate(-90deg)  scale(1.15); }
    #btn-left:hover  img { transform: rotate(180deg)  scale(1.15); }
    #btn-down:hover  img { transform: rotate(90deg)   scale(1.15); }
    #btn-right:hover img { transform: rotate(0deg)    scale(1.15); }
  </style>
</head>
<body>

  <div id="game-container">

    <!-- 背景 -->
    <img id="bg" src="bg.png" alt="forest background" />

    <!-- 蜜蜂 (最左側，垂直居中) -->
    <img id="bee" class="sprite" src="bee.png" alt="bee" />

    <!-- 蜻蜓 (左側中間偏上) -->
    <img id="dragonfly" class="sprite" src="dragonfly.png" alt="dragonfly" />

    <!-- 粉紅花 (上方中央) -->
    <img id="flower-pink" class="sprite" src="flower1.png" alt="pink flower" />

    <!-- 紅花 (右側) -->
    <img id="flower-red" class="sprite" src="Flower-4.png" alt="red flower" />

    <!-- 蔥 (中右偏上) -->
    <img id="scallion" class="sprite" src="scallion.png" alt="scallion" />

    <!-- 草莓 (中央偏下) -->
    <img id="berry" class="sprite" src="berry.png" alt="berry" />

    <!-- 箭頭控制區塊（與上方精靈分開，固定在底部左側） -->
    <div id="arrow-panel">
      <div id="btn-up"    class="arrow-btn"><img src="arrow.png" alt="up"    /></div>
      <div id="btn-left"  class="arrow-btn"><img src="arrow.png" alt="left"  /></div>
      <div id="btn-down"  class="arrow-btn"><img src="arrow.png" alt="down"  /></div>
      <div id="btn-right" class="arrow-btn"><img src="arrow.png" alt="right" /></div>
    </div>

  </div>

  <script>
    /* ═══════════════════════════════════════════════════
       常數設定
       ═══════════════════════════════════════════════════ */
    const GAME_W  = 900;          // 遊戲容器寬 (px)
    const GAME_H  = 506;          // 遊戲容器高 (px)
    const PAD     = 12;           // 隨機精靈碰撞盒額外間距 (px)
    const MIN_FLOWER_DIST = 250;  // 兩花最小中心距離 (px)
    const MAX_TRIES = 1000;       // 隨機位置最大重試次數

    // 蜜蜂尺寸與移動步距
    const BEE_W    = 80;
    const BEE_H    = 80;   // 估算高度（圖片為正方形）
    const BEE_STEP = 5;    // 每次移動像素

    // 箭頭面板佔用區域（左下角，對應 CSS 設定）
    // bottom:12 left:16, grid 約 3×64 + gap×2 + padding×2 + border×2 = 222px 寬, 2×64+gap+pad×2+border×2 = 154px 高
    const ARROW_PANEL = { x: 0, y: GAME_H - 166, w: 236, h: 166 };

    /* ═══════════════════════════════════════════════════
       蜜蜂狀態（由 JS 全權管理）
       ═══════════════════════════════════════════════════ */
    const bee = {
      el: null,       // DOM 元素
      x: 20,          // 初始 left
      y: 0,           // 初始 top（DOMContentLoaded 後計算）
      facingRight: true,  // true=朝右, false=朝左
    };

    /** 將蜜蜂目前狀態同步到 DOM */
    function renderBee() {
      bee.el.style.left      = bee.x + 'px';
      bee.el.style.top       = bee.y + 'px';
      // 左右翻轉：朝左時水平鏡像
      bee.el.style.transform = bee.facingRight ? 'scaleX(1)' : 'scaleX(-1)';
    }

    /**
     * 移動蜜蜂
     * @param {number} dx  水平位移（正=右，負=左）
     * @param {number} dy  垂直位移（正=下，負=上）
     */
    function moveBee(dx, dy) {
      // 計算新位置
      let nx = bee.x + dx;
      let ny = bee.y + dy;

      // ── 邊界限制 ──
      // 左右邊界
      nx = Math.max(0, Math.min(GAME_W - BEE_W, nx));

      // 上邊界
      ny = Math.max(0, ny);

      // 下邊界：若蜜蜂即將進入箭頭面板橫向範圍，需額外抬高上限
      const beeRight = nx + BEE_W;      // 蜜蜂右緣
      const panelTop = ARROW_PANEL.y;   // 面板頂端
      const panelRight = ARROW_PANEL.x + ARROW_PANEL.w; // 面板右緣

      if (nx < panelRight && beeRight > ARROW_PANEL.x) {
        // 蜜蜂 X 範圍與面板重疊 → 下方不能低於面板頂端
        ny = Math.min(panelTop - BEE_H, ny);
      } else {
        // 蜜蜂在面板右側 → 正常底部邊界
        ny = Math.min(GAME_H - BEE_H, ny);
      }

      bee.x = nx;
      bee.y = ny;

      // 更新朝向（只有左右移動才改變）
      if (dx > 0) bee.facingRight = true;
      if (dx < 0) bee.facingRight = false;

      renderBee();
    }

    /* ═══════════════════════════════════════════════════
       鍵盤控制（方向鍵）
       ═══════════════════════════════════════════════════ */
    window.addEventListener('keydown', (e) => {
      switch (e.key) {
        case 'ArrowUp':    e.preventDefault(); moveBee( 0, -BEE_STEP); break;
        case 'ArrowDown':  e.preventDefault(); moveBee( 0, +BEE_STEP); break;
        case 'ArrowLeft':  e.preventDefault(); moveBee(-BEE_STEP, 0);  break;
        case 'ArrowRight': e.preventDefault(); moveBee(+BEE_STEP, 0);  break;
      }
    });

    /* ═══════════════════════════════════════════════════
       按鈕點擊控制（畫面上的箭頭按鈕）
       ═══════════════════════════════════════════════════ */
    function bindArrowBtn(id, dx, dy) {
      document.getElementById(id).addEventListener('click', () => moveBee(dx, dy));
    }

    /* ═══════════════════════════════════════════════════
       隨機精靈位置配置（其餘物件）
       ═══════════════════════════════════════════════════ */
    // 隨機精靈定義：id、寬、高（高度估算）
    const SPRITES = [
      { id: 'flower-pink', w: 90,  h: 90,  isFlower: true  },
      { id: 'flower-red',  w: 90,  h: 90,  isFlower: true  },
      { id: 'dragonfly',   w: 90,  h: 80,  isFlower: false },
      { id: 'scallion',    w: 65,  h: 90,  isFlower: false },
      { id: 'berry',       w: 70,  h: 80,  isFlower: false },
    ];

    function rand(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function overlaps(a, b) {
      return !(
        a.x + a.w + PAD <= b.x ||
        b.x + b.w + PAD <= a.x ||
        a.y + a.h + PAD <= b.y ||
        b.y + b.h + PAD <= a.y
      );
    }

    function centerDist(a, b) {
      const ax = a.x + a.w / 2, ay = a.y + a.h / 2;
      const bx = b.x + b.w / 2, by = b.y + b.h / 2;
      return Math.hypot(ax - bx, ay - by);
    }

    function randomPos(sprite) {
      return {
        x: rand(0, GAME_W - sprite.w),
        y: rand(0, GAME_H - sprite.h),
        w: sprite.w,
        h: sprite.h,
      };
    }

    function applyPos(id, pos) {
      const el = document.getElementById(id);
      el.style.left = pos.x + 'px';
      el.style.top  = pos.y + 'px';
    }

    function placeSprites() {
      const placed = [];

      // 蜜蜂禁區（初始位置左側區塊）
      placed.push({ x: 0, y: 0, w: 120, h: GAME_H });
      // 箭頭面板禁區
      placed.push(ARROW_PANEL);

      let flowerPos = [];

      for (const sprite of SPRITES) {
        let pos = null;

        for (let t = 0; t < MAX_TRIES; t++) {
          const candidate = randomPos(sprite);

          const clash = placed.some(p => overlaps(candidate, p));
          if (clash) continue;

          if (sprite.isFlower && flowerPos.length > 0) {
            const tooClose = flowerPos.some(
              fp => centerDist(candidate, fp) < MIN_FLOWER_DIST
            );
            if (tooClose) continue;
          }

          pos = candidate;
          break;
        }

        if (!pos) {
          console.warn(`[BeeGame] 無法為 ${sprite.id} 找到完全不重疊的位置，使用備用位置。`);
          pos = randomPos(sprite);
        }

        placed.push(pos);
        if (sprite.isFlower) flowerPos.push(pos);
        applyPos(sprite.id, pos);
      }

      console.log('🐝 蜜蜂授粉遊戲 - 隨機位置配置完成');
    }

    /* ═══════════════════════════════════════════════════
       初始化
       ═══════════════════════════════════════════════════ */
    window.addEventListener('DOMContentLoaded', () => {
      // 初始化蜜蜂 DOM 參考與位置
      bee.el = document.getElementById('bee');
      bee.x  = 20;
      bee.y  = Math.round((GAME_H - BEE_H) / 2);  // 垂直置中
      renderBee();

      // 綁定箭頭按鈕
      bindArrowBtn('btn-up',    0,        -BEE_STEP);
      bindArrowBtn('btn-down',  0,        +BEE_STEP);
      bindArrowBtn('btn-left',  -BEE_STEP, 0);
      bindArrowBtn('btn-right', +BEE_STEP, 0);

      // 隨機放置其他精靈
      placeSprites();
    });
  </script>

</body>
</html>
